<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow circle -->
  <circle cx="600" cy="315" r="340" fill="url(#glow)"/>
  <!-- Grid lines subtle -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#334155" stroke-width="1" opacity="0.4"/>

  <!-- Card -->
  <rect x="140" y="160" width="920" height="310" rx="24" ry="24" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>

  <!-- Logo mark -->
  <text x="160" y="225" font-family="monospace" font-size="42" fill="#3b82f6">⬡</text>

  <!-- Brand -->
  <text x="215" y="225" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#f8fafc">meuip</text>
  <text x="370" y="225" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#3b82f6">.me</text>

  <!-- Label -->
  <text x="160" y="295" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#64748b" letter-spacing="3">YOUR PUBLIC IP ADDRESS</text>

  <!-- IP Placeholder -->
  <text x="160" y="370" font-family="'Courier New', monospace" font-size="64" font-weight="700" fill="#f8fafc" letter-spacing="-1">203.0.113.42</text>

  <!-- Country -->
  <text x="163" y="420" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#94a3b8">🌎  Brazil  ·  São Paulo  ·  IPv4</text>

  <!-- Tagline -->
  <text x="600" y="565" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#475569" text-anchor="middle">Fast · Accurate · Free · No tracking</text>
</svg>
